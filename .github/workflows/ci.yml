name: CI — Lint, Test & Coverage

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  PYTHON_VERSION: "3.10"
  MLFLOW_TRACKING_URI: "http://localhost:5000"
  MLFLOW_EXPERIMENT_NAME: "ChurnShield"
  MLFLOW_MODEL_NAME: "ChurnShield-Model"
  PROCESSED_DATA_PATH: "data/processed/telco_churn_processed.csv"
  RAW_DATA_PATH: "data/raw/telco_churn.csv"
  REFERENCE_DATA_PATH: "data/reference/reference_dataset.csv"
  DRIFT_REPORT_PATH: "monitoring/reports"
  DRIFT_THRESHOLD: "0.3"

jobs:
  # ============================================================
  # Job 1: Code Quality Checks
  # ============================================================
  lint:
    name: Code Quality (Black + Flake8)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install linting dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black==24.4.2 flake8==7.0.0 isort==5.13.2

      - name: Check formatting with Black
        run: |
          black --check src/ tests/ pipelines/ --line-length=88
        continue-on-error: false

      - name: Check import ordering with isort
        run: |
          isort --check-only src/ tests/ pipelines/ --profile=black

      - name: Lint with Flake8
        run: |
          flake8 src/ tests/ pipelines/ \
            --max-line-length=88 \
            --extend-ignore=E203,W503,E501 \
            --exclude=__pycache__,.git,*.egg-info

  # ============================================================
  # Job 2: Tests with Coverage
  # ============================================================
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Create required directories
        run: |
          mkdir -p data/raw data/processed data/reference monitoring/reports logs models

      - name: Run pytest with coverage
        run: |
          pytest tests/ \
            -v \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            -x \
            --tb=short
        env:
          MLFLOW_TRACKING_URI: ${{ env.MLFLOW_TRACKING_URI }}
          PROCESSED_DATA_PATH: ${{ env.PROCESSED_DATA_PATH }}
          RAW_DATA_PATH: ${{ env.RAW_DATA_PATH }}
          REFERENCE_DATA_PATH: ${{ env.REFERENCE_DATA_PATH }}

      - name: Upload coverage report to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.10'
        with:
          file: ./coverage.xml
          flags: unittests
          name: churnshield-coverage
          fail_ci_if_error: false

      - name: Upload coverage HTML artifact
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.10'
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7

  # ============================================================
  # Job 3: Docker Build Validation (no push, just verify)
  # ============================================================
  docker-build-check:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate API Dockerfile build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: false
          tags: churnshield-api:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate Frontend Dockerfile build
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: docker/Dockerfile.frontend
          push: false
          tags: churnshield-frontend:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
