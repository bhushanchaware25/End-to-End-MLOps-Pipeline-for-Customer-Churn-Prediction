version: "3.9"

# ============================================================
# ChurnShield MLOps Platform — Docker Compose
# ============================================================
# Services:
#   postgres   — MLflow backend metadata store
#   mlflow     — Experiment tracking UI + REST API
#   prefect    — Pipeline orchestration UI + API server
#   api        — FastAPI prediction service
#   frontend   — React.js dashboard (Nginx)
#
# Usage:
#   docker-compose up -d
#   docker-compose down -v        # stop + remove volumes
#   docker-compose logs -f api    # tail API logs
# ============================================================

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

networks:
  churnshield-net:
    driver: bridge
    name: churnshield-net

volumes:
  postgres-data:
    name: churnshield-postgres-data
  mlflow-artifacts:
    name: churnshield-mlflow-artifacts
  prefect-data:
    name: churnshield-prefect-data

services:

  # ──────────────────────────────────────────────────────────
  # PostgreSQL — MLflow backend metadata store
  # ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: churnshield-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mlflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mlflow_password}
      POSTGRES_DB: ${POSTGRES_DB:-mlflow_db}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - churnshield-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mlflow} -d ${POSTGRES_DB:-mlflow_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging

  # ──────────────────────────────────────────────────────────
  # MLflow — Experiment tracking & Model Registry
  # ──────────────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.2
    container_name: churnshield-mlflow
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://${POSTGRES_USER:-mlflow}:${POSTGRES_PASSWORD:-mlflow_password}@postgres:5432/${POSTGRES_DB:-mlflow_db}
      MLFLOW_ARTIFACT_ROOT: /mlflow/artifacts
    volumes:
      - mlflow-artifacts:/mlflow/artifacts
    networks:
      - churnshield-net
    ports:
      - "5000:5000"
    command: >
      mlflow server
        --backend-store-uri postgresql://${POSTGRES_USER:-mlflow}:${POSTGRES_PASSWORD:-mlflow_password}@postgres:5432/${POSTGRES_DB:-mlflow_db}
        --default-artifact-root /mlflow/artifacts
        --host 0.0.0.0
        --port 5000
        --serve-artifacts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging: *default-logging

  # ──────────────────────────────────────────────────────────
  # Prefect — Pipeline orchestration UI + API
  # ──────────────────────────────────────────────────────────
  prefect:
    image: prefecthq/prefect:2.19.3-python3.10
    container_name: churnshield-prefect
    restart: unless-stopped
    environment:
      PREFECT_API_URL: http://0.0.0.0:4200/api
      PREFECT_SERVER_API_HOST: 0.0.0.0
      PREFECT_SERVER_API_PORT: "4200"
      PREFECT_UI_ENABLED: "true"
    volumes:
      - prefect-data:/root/.prefect
    networks:
      - churnshield-net
    ports:
      - "4200:4200"
    command: prefect server start --host 0.0.0.0 --port 4200
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4200/api/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging: *default-logging

  # ──────────────────────────────────────────────────────────
  # ChurnShield API — FastAPI prediction service
  # ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      args:
        BUILD_DATE: ${BUILD_DATE:-unknown}
        VCS_REF: ${VCS_REF:-unknown}
    image: churnshield-api:latest
    container_name: churnshield-api
    restart: unless-stopped
    depends_on:
      mlflow:
        condition: service_healthy
    env_file:
      - .env
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_MODEL_NAME: ${MLFLOW_MODEL_NAME:-ChurnShield-Model}
      MODEL_STAGE: ${MODEL_STAGE:-Production}
      API_HOST: 0.0.0.0
      API_PORT: "8000"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PROCESSED_DATA_PATH: data/processed/telco_churn_processed.csv
      REFERENCE_DATA_PATH: data/reference/reference_dataset.csv
      DRIFT_REPORT_PATH: monitoring/reports
      DRIFT_THRESHOLD: ${DRIFT_THRESHOLD:-0.3}
      ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:5173,http://frontend:80"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./monitoring:/app/monitoring
      - ./logs:/app/logs
    networks:
      - churnshield-net
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging: *default-logging

  # ──────────────────────────────────────────────────────────
  # ChurnShield Frontend — React.js dashboard (Nginx)
  # ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    image: churnshield-frontend:latest
    container_name: churnshield-frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    networks:
      - churnshield-net
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging: *default-logging
